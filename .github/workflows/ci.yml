name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # target runtime (TECHSTACK §3)
          cache: pip

      - name: Install (lean — quality gate only, skip heavy ML runtime)
        # The lint/type/test gate does not need torch/ctranslate2/faster-whisper/etc.
        # Install the package without deps + just the tools and pydantic. This keeps CI
        # fast and avoids platform-specific ML wheel failures on the runner.
        run: |
          pip install -e . --no-deps
          pip install pydantic==2.13.4 ollama==0.6.2 ruff==0.15.19 mypy==2.1.0 pytest==9.1.1

      - name: Lint (ruff)
        run: ruff check src eval tests

      - name: Format check (ruff)
        run: ruff format --check src eval tests

      - name: Type check (mypy)
        run: mypy src/callbot

      - name: Tests (pytest)
        run: pytest -q

      - name: Import smoke test
        run: python -c "import callbot"
